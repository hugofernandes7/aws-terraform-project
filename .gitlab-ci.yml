stages:
  - build
  - deploy

variables:
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

build_image:
  stage: build
  image: docker:latest

  services:
    - name: docker:24.0.5-dind

  script:
    - echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USER" --password-stdin
    - docker build -t $DOCKER_USER/webapp:$IMAGE_TAG -f app/Dockerfile app
    - docker push $DOCKER_USER/webapp:$IMAGE_TAG
    - docker build -t $DOCKER_USER/nomad-runner:$IMAGE_TAG -f nomad-runner/Dockerfile .
    - docker push $DOCKER_USER/nomad-runner:$IMAGE_TAG

deploy:
  stage: deploy
  image: $DOCKER_USER/nomad-runner:$IMAGE_TAG


  script:
    - nomad job run
      -var="IMAGE_TAG=$IMAGE_TAG"
      -var="DOCKER_USER=$DOCKER_USER"
      -var="DOCKER_TOKEN=$DOCKER_TOKEN"
      nomad-jobs/webapp.hcl

